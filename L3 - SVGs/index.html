<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="style.css" />
        <title>Document</title>
    </head>
    <body>
        <div id="string">
            <!-- M: Starting point (x, y) coordinates as per width and height of svg -->
            <!-- C: Cubic curve (slightly complex), Q: Quadratic curves (simple) -->
            <!-- The 4 values after Q/C are center point and last point, eg: (95, 10) and (180, 80). Joining these points actually gives us the desired curve. -->
            <!-- In short, d just provides us with the coordinates of points for the curve. Remember class 11th maths? -->
            <!-- Store: Color of line formed inside svg -->
            <!-- Fill: Inside color of curve -->
            <svg width="1000" height="200">
                <path
                    d="M 10 100 Q 500 100 990 100"
                    stroke="white"
                    fill="transparent"
                />
            </svg>
        </div>

        <script
            src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"
            integrity="sha512-NcZdtrT77bJr4STcmsGAESr06BYGE8woZdSdEgqnpyqac7sugNO+Tr4bGwGF3MsnEkGKhU2KL2xh6Ec+BqsaHA=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        ></script>
        <script src="script.js"></script>
    </body>
</html>
